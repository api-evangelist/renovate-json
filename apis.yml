aid: renovate-json
name: Renovate
description: >-
  Renovate is an open-source, cross-platform dependency automation tool by Mend.io
  that automatically creates pull requests to keep software dependencies up to date.
  It supports over 90 package managers and language ecosystems including npm, PyPI,
  Maven, Docker, Helm, Go modules, Ruby Gems, NuGet, and more. Renovate runs as a
  CLI, Docker container, GitHub Action, or hosted cloud service (Mend Renovate App).
  It integrates with GitHub, GitLab, Bitbucket, Azure DevOps, Gitea, Forgejo, and
  AWS CodeCommit. Configuration is done via a renovate.json file in the repository root.
  The tool supports advanced scheduling, monorepo support, preset sharing, merge
  confidence scoring, and automatic replacement of deprecated packages.
